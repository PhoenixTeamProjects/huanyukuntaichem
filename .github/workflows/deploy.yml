name: Deploy to VPS

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create deployment archive
        run: |
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='frontend/.next' \
            -czf /tmp/huanyukuntaichem-${GITHUB_SHA}.tar.gz .

      - name: Validate deployment secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          missing=0
          for name in VPS_HOST VPS_USER VPS_PORT VPS_SSH_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing GitHub secret::$name is not configured in repository Actions secrets"
              missing=1
            fi
          done
          exit "$missing"

      - name: Prepare SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/huanyukuntaichem_deploy_key
          chmod 600 ~/.ssh/huanyukuntaichem_deploy_key
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload archive
        run: |
          ssh -i ~/.ssh/huanyukuntaichem_deploy_key -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p /var/www/huanyukuntaichem/releases"
          scp -i ~/.ssh/huanyukuntaichem_deploy_key -P "${{ secrets.VPS_PORT }}" \
            /tmp/huanyukuntaichem-${GITHUB_SHA}.tar.gz \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/huanyukuntaichem/releases/${GITHUB_SHA}.tar.gz"

      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/huanyukuntaichem_deploy_key -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "bash /var/www/huanyukuntaichem/current/scripts/deploy-vps.sh ${GITHUB_SHA}"
